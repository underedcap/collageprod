version: '3.8'

services:
  mysql:
    image: mysql:8
    container_name: vpn_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123123
      MYSQL_DATABASE: vpn_db
      MYSQL_USER: vpnuser
      MYSQL_PASSWORD: vpnpass
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: vpn_backend
    restart: always
    depends_on:
      - mysql
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/vpn_db?useSSL=false&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: vpnuser
      SPRING_DATASOURCE_PASSWORD: vpnpass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

  bot:
    build: ./bot
    container_name: vpn_bot
    restart: always
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8080